# MISS_HIT configuration for MATLAB formatting.

tab_width: 4
line_length: 200

# This project already uses mixed MATLAB naming styles such as CSOptions,
# PGSolverOptions, bothcs, and ex01_minimal_bothcs. Keep formatting separate
# from naming policy for now.
suppress_rule: "naming_classes"
suppress_rule: "naming_functions"
suppress_rule: "naming_parameters"
suppress_rule: "naming_scripts"
suppress_rule: "copyright_notice"
suppress_rule: "unicode"
